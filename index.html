<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="" id="meta-description" />
  <title id="page-title">13Paranormal</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />

  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

  <link rel="icon" type="image/png" sizes="512x512" href="/favicon-512x512.png" />

  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ===================== NAV ===================== -->
  <nav class="site-nav" role="navigation" aria-label="Main navigation">
    <div class="nav-inner">
      <a href="/" class="nav-logo" id="nav-title">13Paranormal</a>
      <ul class="nav-links" id="nav-links" role="list">
        <li><a href="/">Home</a></li>
        <li><a href="#contact">Contact</a></li>
      </ul>
      <button class="nav-toggle" id="nav-toggle"
        aria-label="Toggle navigation" aria-expanded="false" aria-controls="nav-links">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <!-- ===================== HERO ===================== -->
  <section class="hero" aria-labelledby="hero-title">
    <div class="hero-inner">

      <div class="hero-logo" id="hero-logo-wrap" style="display:none">
        <img id="hero-logo-img" src="" alt="13Paranormal logo" />
      </div>

      <div class="hero-text">
        <h1 id="hero-title" class="hero-title"></h1>
        <p class="hero-subtitle" id="hero-subtitle"></p>
        <p class="hero-body" id="hero-body"></p>
      </div>

    </div>
  </section>

  <hr class="section-divider" />

  <!-- ===================== SERVICES ===================== -->
  <section class="services" aria-label="Our services">
    <div class="services-inner">
      <div class="services-grid" id="services-grid">
        <!-- Populated from _data/content.json -->
      </div>
    </div>
  </section>

  <hr class="section-divider" />

  <!-- ===================== CTA / CONTACT ===================== -->
  <section class="cta-section" id="contact" aria-labelledby="cta-heading">
    <div class="cta-inner">
      <h2 id="cta-heading" class="cta-heading"></h2>
      <p class="cta-body" id="cta-body"></p>
      <p class="cta-contact">
        For more information, contact us at
        <a href="#" id="contact-link"></a>
      </p>

      <!-- Social media links -->
      <div class="social-links" aria-label="Social media links">

        <a href="https://www.facebook.com/thirteen.paranormal" target="_blank" rel="noopener noreferrer" class="social-link facebook" aria-label="13Paranormal on Facebook">
          <!-- Facebook icon -->
          <svg class="social-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">

          </svg>
          <span class="social-name">13 Paranormal</span>
        </a>

        <a href="https://www.instagram.com/13.paranormal" target="_blank" rel="noopener noreferrer" class="social-link instagram" aria-label="13Paranormal on Instagram">
          <!-- Instagram icon -->
          <svg class="social-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/>
          </svg>
          <span class="social-name">13.paranormal</span>
        </a>

        <a href="https://x.com/13Paranormal1" target="_blank" rel="noopener noreferrer" class="social-link x" aria-label="13Paranormal on X">
          <!-- X (Twitter) icon -->
          <svg class="social-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
            <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
          </svg>
          <span class="social-name">13Paranormal1</span>
        </a>

        <a href="https://tiktok.com/@13.paranormal" target="_blank" rel="noopener noreferrer" class="social-link tiktok" aria-label="13Paranormal on TikTok">
          <!-- TikTok icon -->
          <svg class="social-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
            <path d="M19.59 6.69a4.83 4.83 0 01-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 01-2.88 2.5 2.89 2.89 0 01-2.89-2.89 2.89 2.89 0 012.89-2.89c.28 0 .54.04.79.1V9.01a6.33 6.33 0 00-.79-.05 6.34 6.34 0 00-6.34 6.34 6.34 6.34 0 006.34 6.34 6.34 6.34 0 006.33-6.34V8.69a8.18 8.18 0 004.78 1.52V6.76a4.85 4.85 0 01-1.02-.07z"/>
          </svg>
          <span class="social-name">13.paranormal</span>
        </a>

      </div>
    </div>
  </section>

  <!-- ===================== FOOTER ===================== -->
  <footer class="site-footer">
    <p>
      &copy; <span id="year"></span>
      <span id="footer-text"></span>
      &nbsp;|&nbsp;
      <a href="#" id="footer-email"></a>
    </p>
  </footer>

  <script>
    // ── Mobile nav toggle ────────────────────────────────
    const toggle = document.getElementById('nav-toggle');
    const links  = document.getElementById('nav-links');
    toggle.addEventListener('click', () => {
      const open = links.classList.toggle('open');
      toggle.setAttribute('aria-expanded', String(open));
    });
    document.addEventListener('click', (e) => {
      if (!toggle.contains(e.target) && !links.contains(e.target)) {
        links.classList.remove('open');
        toggle.setAttribute('aria-expanded', 'false');
      }
    });

    // ── Footer year ──────────────────────────────────────
    document.getElementById('year').textContent = new Date().getFullYear();

    // ── Load content from JSON ───────────────────────────
    fetch('/_data/content.json')
      .then(r => {
        if (!r.ok) throw new Error('content.json not found');
        return r.json();
      })
      .then(d => {
        document.title = d.site_title;
        document.getElementById('meta-description').content = d.hero_body;
        document.getElementById('nav-title').textContent = d.nav_title;

        // Hero logo
        if (d.hero_image) {
          const wrap = document.getElementById('hero-logo-wrap');
          const img  = document.getElementById('hero-logo-img');
          img.src            = d.hero_image;
          img.alt            = d.nav_title + ' logo';
          wrap.style.display = 'flex';
        }

        // Hero text
        document.getElementById('hero-title').textContent    = d.hero_title;
        document.getElementById('hero-subtitle').textContent = d.hero_subtitle;
        document.getElementById('hero-body').textContent     = d.hero_body;

        // Services
        const grid = document.getElementById('services-grid');
        (d.services || []).forEach(s => {
          const col = document.createElement('div');
          col.className = 'service-col';
          const h3 = document.createElement('h3');
          h3.textContent = s.title;
          const p = document.createElement('p');
          p.textContent = s.body;
          col.appendChild(h3);
          col.appendChild(p);
          grid.appendChild(col);
        });

        // CTA
        document.getElementById('cta-heading').textContent = d.cta_heading;
        document.getElementById('cta-body').textContent    = d.cta_body;

        // Contact email
        const email = d.contact_email;
        const contactLink = document.getElementById('contact-link');
        contactLink.href        = 'mailto:' + email;
        contactLink.textContent = email;

        // Footer
        document.getElementById('footer-text').textContent = d.footer_text;
        const footerEmail = document.getElementById('footer-email');
        footerEmail.href        = 'mailto:' + email;
        footerEmail.textContent = email;
      })
      .catch(err => console.error('Failed to load content:', err));
  </script>

</body>
</html>
