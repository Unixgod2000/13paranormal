<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Meet the investigators of 13Paranormal." id="meta-description" />
  <title>Meet the Team | 13Paranormal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="/favicon-192x192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="/favicon-512x512.png" />
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    .inner-page { max-width: 960px; margin: 0 auto; padding: 3rem 1.5rem 4rem; }
    .inner-page h1 { font-size: 2.25rem; font-weight: 700; margin-bottom: 0.5rem; }
    .page-intro { font-size: 1.05rem; opacity: 0.85; margin-bottom: 2.5rem; }
    .bios-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 2rem;
    }
    .bio-card {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    .bio-photo {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      border-radius: 8px;
      background: rgba(255,255,255,0.06);
    }
    .bio-photo-placeholder {
      width: 100%;
      aspect-ratio: 1 / 1;
      border-radius: 8px;
      background: rgba(255,255,255,0.06);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      opacity: 0.3;
    }
    .bio-name { font-size: 1.2rem; font-weight: 700; margin: 0; }
    .bio-role { font-size: 0.9rem; opacity: 0.65; margin: 0; }
    .bio-body { font-size: 0.95rem; line-height: 1.7; opacity: 0.88; white-space: pre-line; }
  </style>
</head>
<body>

  <nav class="site-nav" role="navigation" aria-label="Main navigation">
    <div class="nav-inner">
      <a href="/" class="nav-logo" id="nav-title">13Paranormal</a>
      <ul class="nav-links" id="nav-links" role="list">
        <li><a href="/">Home</a></li>
      </ul>
      <button class="nav-toggle" id="nav-toggle"
        aria-label="Toggle navigation" aria-expanded="false" aria-controls="nav-links">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <main>
    <div class="inner-page" aria-live="polite">
      <h1 id="page-title">Meet the Team</h1>
      <p class="page-intro" id="page-intro"></p>
      <div class="bios-grid" id="bios-grid"></div>
    </div>
  </main>

  <footer class="site-footer">
    <p>
      &copy; <span id="year"></span>
      <span id="footer-text"></span>
      &nbsp;|&nbsp;
      <a href="#" id="footer-email"></a>
    </p>
  </footer>

  <script>
    function buildNav(data, currentPage) {
      const ul = document.getElementById('nav-links');
      ul.innerHTML = '<li><a href="/">Home</a></li>';
      (data.pages || []).forEach(p => {
        if (!p.enabled) return;
        const li = document.createElement('li');
        const a  = document.createElement('a');
        a.href = '/' + p.id;
        a.textContent = p.label;
        if (p.id === currentPage) a.setAttribute('aria-current', 'page');
        li.appendChild(a);
        ul.appendChild(li);
      });
      const contactLi = document.createElement('li');
      contactLi.innerHTML = '<a href="/#contact">Contact</a>';
      ul.appendChild(contactLi);
    }

    function applyShared(data, currentPage) {
      if (data.nav_title)     document.getElementById('nav-title').textContent   = data.nav_title;
      if (data.footer_text)   document.getElementById('footer-text').textContent = data.footer_text;
      if (data.contact_email) {
        const fe = document.getElementById('footer-email');
        fe.href = 'mailto:' + data.contact_email;
        fe.textContent = data.contact_email;
      }
      buildNav(data, currentPage);
    }

    const toggle = document.getElementById('nav-toggle');
    const links  = document.getElementById('nav-links');
    toggle.addEventListener('click', () => {
      const open = links.classList.toggle('open');
      toggle.setAttribute('aria-expanded', String(open));
    });
    document.addEventListener('click', e => {
      if (!toggle.contains(e.target) && !links.contains(e.target)) {
        links.classList.remove('open');
        toggle.setAttribute('aria-expanded', 'false');
      }
    });

    document.getElementById('year').textContent = new Date().getFullYear();

    fetch('/_data/content.json')
      .then(r => r.ok ? r.json() : Promise.reject())
      .then(d => applyShared(d, 'bios'))
      .catch(() => {});

    fetch('/_data/bios.json')
      .then(r => r.ok ? r.json() : Promise.reject())
      .then(d => {
        if (d.page_title) {
          document.getElementById('page-title').textContent = d.page_title;
          document.title = d.page_title + ' | 13Paranormal';
        }
        if (d.page_intro) document.getElementById('page-intro').textContent = d.page_intro;

        const grid = document.getElementById('bios-grid');
        (d.members || []).forEach(m => {
          const card = document.createElement('div');
          card.className = 'bio-card';

          if (m.photo) {
            const img = document.createElement('img');
            img.src = m.photo;
            img.alt = m.name + ' photo';
            img.className = 'bio-photo';
            card.appendChild(img);
          } else {
            const ph = document.createElement('div');
            ph.className = 'bio-photo-placeholder';
            ph.textContent = '👤';
            card.appendChild(ph);
          }

          const name = document.createElement('p');
          name.className = 'bio-name';
          name.textContent = m.name;
          card.appendChild(name);

          if (m.role) {
            const role = document.createElement('p');
            role.className = 'bio-role';
            role.textContent = m.role;
            card.appendChild(role);
          }

          if (m.bio) {
            const bio = document.createElement('p');
            bio.className = 'bio-body';
            bio.textContent = m.bio;
            card.appendChild(bio);
          }

          grid.appendChild(card);
        });
      })
      .catch(() => {});
  </script>

</body>
</html>
