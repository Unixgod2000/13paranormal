backend:
  name: github
  repo: Unixgod2000/13paranormal
  branch: main
  base_url: https://sveltia-cms-auth-13p.unixgod.workers.dev

media_folder: images
public_folder: /images

site_url: https://www.13paranormal.org

collections:

  # ── Site-wide settings + Home Page ────────────────────────────────────────
  - name: site_content
    label: Site Content
    files:

      - name: home
        label: Home Page
        file: _data/content.json
        format: json
        fields:

          - label: "Browser Tab Title"
            name: site_title
            widget: string
            hint: "Text shown in the browser tab."

          - label: "Navigation Logo Text"
            name: nav_title
            widget: string
            required: false
            hint: "Organization name shown in the top-left navigation bar."

          - label: "Hero — Logo Image"
            name: hero_image
            widget: image
            required: false
            hint: "Logo or image displayed on the left side of the hero section. Recommended size: 400x400px or square. Leave blank to show text only."

          - label: "Hero — Main Title"
            name: hero_title
            widget: string
            hint: "Large heading displayed in the hero section."

          - label: "Hero — Subtitle"
            name: hero_subtitle
            widget: string
            hint: "Tagline displayed below the main title."

          - label: "Hero — Body Text"
            name: hero_body
            widget: text
            hint: "Introductory paragraph describing the organization."

          - label: "Services"
            name: services
            widget: list
            summary: "{{fields.title}}"
            hint: "The service columns shown on the home page. Add, remove, or reorder as needed."
            fields:
              - label: "Service Title"
                name: title
                widget: string
              - label: "Service Description"
                name: body
                widget: text

          - label: "CTA — Heading"
            name: cta_heading
            widget: string
            hint: "Heading in the call-to-action section."

          - label: "CTA — Body Text"
            name: cta_body
            widget: text
            hint: "Paragraph below the CTA heading."

          - label: "Contact Email"
            name: contact_email
            widget: string
            hint: "Email address shown in the contact section and footer."

          - label: "Footer Text"
            name: footer_text
            widget: string
            hint: "Organization name in the footer copyright line."

          - label: "Navigation — Page Visibility"
            name: pages
            widget: list
            summary: "{{fields.label}} — {{fields.enabled}}"
            hint: "Control which pages appear in the navigation bar. Toggle 'Enabled' to show or hide a page link."
            fields:
              - label: "Page ID"
                name: id
                widget: string
                hint: "Do not change — must match the page filename (e.g. 'events' for events.html)."
              - label: "Nav Label"
                name: label
                widget: string
                hint: "Text shown in the navigation bar."
              - label: "Enabled"
                name: enabled
                widget: boolean
                default: false
                hint: "Show this page in the nav bar."

  # ── About Us ──────────────────────────────────────────────────────────────
  - name: about_page
    label: About Us
    files:
      - name: about
        label: About Us
        file: _data/about.json
        format: json
        fields:
          - label: "Page Title"
            name: page_title
            widget: string
            hint: "Heading shown at the top of the About Us page."
          - label: "Sections"
            name: sections
            widget: list
            summary: "{{fields.heading}}"
            hint: "Add as many sections as you need. Each section has a heading and a body of text."
            fields:
              - label: "Section Heading"
                name: heading
                widget: string
              - label: "Section Body"
                name: body
                widget: text

  # ── Bio Page ──────────────────────────────────────────────────────────────
  - name: bios_page
    label: Bio Page
    files:
      - name: bios
        label: Bio Page
        file: _data/bios.json
        format: json
        fields:
          - label: "Page Title"
            name: page_title
            widget: string
            hint: "Heading shown at the top of the Bio page (e.g. 'Meet the Team')."
          - label: "Page Intro"
            name: page_intro
            widget: text
            required: false
            hint: "Optional short paragraph below the heading."
          - label: "Team Members"
            name: members
            widget: list
            summary: "{{fields.name}}"
            hint: "Add one entry per team member. Drag to reorder."
            fields:
              - label: "Name"
                name: name
                widget: string
              - label: "Role / Title"
                name: role
                widget: string
                required: false
              - label: "Photo"
                name: photo
                widget: image
                required: false
                hint: "Square or portrait photo recommended."
              - label: "Bio"
                name: bio
                widget: text

  # ── Past Investigations ───────────────────────────────────────────────────
  - name: investigations_page
    label: Past Investigations
    files:
      - name: investigations
        label: Past Investigations
        file: _data/investigations.json
        format: json
        fields:
          - label: "Page Title"
            name: page_title
            widget: string
            hint: "Heading shown at the top of the Past Investigations page."
          - label: "Page Intro"
            name: page_intro
            widget: text
            required: false
            hint: "Optional short paragraph below the heading."
          - label: "Investigations"
            name: investigations
            widget: list
            summary: "{{fields.location}}"
            hint: "Add one entry per investigation. Drag to reorder."
            fields:
              - label: "Location Name"
                name: location
                widget: string
              - label: "Date"
                name: date
                widget: string
                required: false
                hint: "e.g. October 2024 — plain text so you can be as specific or vague as you like."
              - label: "Featured Image"
                name: image
                widget: image
                required: false
              - label: "Summary"
                name: summary
                widget: text

  # ── Equipment Page ────────────────────────────────────────────────────────
  - name: equipment_page
    label: Equipment Page
    files:
      - name: equipment
        label: Equipment Page
        file: _data/equipment.json
        format: json
        fields:
          - label: "Page Title"
            name: page_title
            widget: string
            hint: "Heading shown at the top of the Equipment page."
          - label: "Page Intro"
            name: page_intro
            widget: text
            required: false
            hint: "Optional short paragraph below the heading."
          - label: "Equipment Items"
            name: items
            widget: list
            summary: "{{fields.name}}"
            hint: "Add one entry per piece of equipment. Drag to reorder."
            fields:
              - label: "Equipment Name"
                name: name
                widget: string
              - label: "Photo"
                name: photo
                widget: image
                required: false
              - label: "Description"
                name: description
                widget: text
