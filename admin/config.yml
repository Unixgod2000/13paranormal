
backend:
  name: github
  repo: Unixgod2000/13paranormal
  branch: main
  base_url: https://sveltia-cms-auth.unixgod.workers.dev

media_folder: images
public_folder: /images

site_url: https://www.13paranormal.com

collections:
  - name: site_content
    label: Site Content
    files:

      - name: home
        label: Home Page
        file: _data/content.json
        format: json
        fields:

          - label: "Browser Tab Title"
            name: site_title
            widget: string

          - label: "Navigation Logo Text"
            name: nav_title
            widget: string

          - label: "Hero — Main Title"
            name: hero_title
            widget: string

          - label: "Hero — Subtitle"
            name: hero_subtitle
            widget: string

          - label: "Hero — Body Text"
            name: hero_body
            widget: text

          - label: "Services"
            name: services
            widget: list
            summary: "{{fields.title}}"
            fields:
              - label: "Service Title"
                name: title
                widget: string
              - label: "Service Description"
                name: body
                widget: text

          - label: "CTA — Heading"
            name: cta_heading
            widget: string

          - label: "CTA — Body Text"
            name: cta_body
            widget: text

          - label: "Contact Email"
            name: contact_email
            widget: string

          - label: "Footer Text"
            name: footer_text
            widget: string
